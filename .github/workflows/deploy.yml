name: Deploy to STACKIT Object Storage

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  BUCKET: sbd
  ENDPOINT: https://object.storage.eu01.onstackit.cloud

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set Public-Read Bucket Policy
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.STACKIT_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.STACKIT_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu01
        run: |
          aws s3api put-bucket-policy \
            --endpoint-url "$ENDPOINT" \
            --bucket "$BUCKET" \
            --policy "{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Principal\":\"*\",\"Action\":\"s3:GetObject\",\"Resource\":\"arn:aws:s3:::${BUCKET}/*\"}]}"

      - name: Sync static files
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.STACKIT_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.STACKIT_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu01
        run: |
          aws s3 sync . "s3://$BUCKET" \
            --endpoint-url "$ENDPOINT" \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "tests/*" \
            --exclude "*.mjs" \
            --cache-control "public, max-age=3600"

          # HTML ohne Cache
          for f in index.html evaluation-criteria.html; do
            [ -f "$f" ] && aws s3 cp "$f" "s3://$BUCKET/$f" \
              --endpoint-url "$ENDPOINT" \
              --cache-control "no-cache, no-store, must-revalidate" \
              --content-type "text/html; charset=utf-8"
          done

      - name: Print live URL
        run: |
          echo "Live: https://${BUCKET}.object.storage.eu01.onstackit.cloud/index.html"
